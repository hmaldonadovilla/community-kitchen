name: Deploy Apps Script

on:
  workflow_dispatch:
    inputs:
      deploymentId:
        description: 'Existing deployment ID to update (optional)'
        required: false
        type: string
      createDeployment:
        description: 'Create a new deployment if no ID is provided'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      skipTests:
        description: 'Skip unit tests'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      webapp_url: ${{ steps.deploy.outputs.webapp_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure clasp auth
        env:
          CLASP_TOKEN: ${{ secrets.CLASP_TOKEN }}
        run: |
          if [ -z "$CLASP_TOKEN" ]; then
            echo "Missing CLASP_TOKEN secret" >&2
            exit 1
          fi
          echo "$CLASP_TOKEN" > ~/.clasprc.json

      - name: Deploy
        id: deploy
        env:
          CLASP_SCRIPT_ID: ${{ secrets.CLASP_SCRIPT_ID }}
          CLASP_DEPLOYMENT_ID: ${{ inputs.deploymentId || secrets.CLASP_DEPLOYMENT_ID }}
          CLASP_CREATE_DEPLOYMENT: ${{ inputs.createDeployment }}
          CLASP_DEPLOY_DESCRIPTION: CI ${GITHUB_SHA}
          SKIP_TESTS: ${{ inputs.skipTests == 'true' && '1' || '' }}
        run: bash scripts/deploy-apps-script.sh

  e2e-smoke-staging:
    runs-on: ubuntu-latest
    needs: deploy
    if: ${{ needs.deploy.outputs.webapp_url != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run staging smoke tests
        env:
          E2E_BASE_URL: ${{ needs.deploy.outputs.webapp_url }}
          E2E_FORM_KEY_MEAL_PRODUCTION: "Config: Meal Production"
          E2E_MOBILE_PRESET: mobile-4g
          E2E_HEADLESS: '1'
        run: npm run test:e2e:staging

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  performance-staging:
    runs-on: ubuntu-latest
    needs:
      - deploy
      - e2e-smoke-staging
    if: ${{ needs.deploy.outputs.webapp_url != '' && needs.e2e-smoke-staging.result == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Lighthouse staging performance audit
        env:
          E2E_BASE_URL: ${{ needs.deploy.outputs.webapp_url }}
        run: npm run perf:lighthouse -- --url="$E2E_BASE_URL" --runs=3 --preset=mobile-4g --output=perf-results/lighthouse-staging.json

      - name: Run scenario staging performance audit
        env:
          E2E_BASE_URL: ${{ needs.deploy.outputs.webapp_url }}
        run: |
          npm run perf:scenario -- --url="$E2E_BASE_URL" --formKey="Config: Meal Production" --runs=3 --preset=mobile-4g --output=perf-results/scenario-staging.json

      - name: Upload performance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-results
          path: perf-results
          if-no-files-found: ignore
